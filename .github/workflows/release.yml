name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: out/make/**/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/make/**/Photoglide-*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME}
          NOTES=$(
            awk -v ver="$VERSION" '
              {
                line = $0
                sub(/\r$/, "", line)
                if (line == "## " ver) { flag = 1; next }
                if (flag && line ~ /^## v/) { flag = 0; next }
                if (flag) print line
              }
            ' CHANGELOG.md
          )
          if [ -z "$NOTES" ]; then
            echo "No release notes found for ${VERSION} in CHANGELOG.md"
            exit 1
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            linux-appimage/**/*.AppImage
            windows-exe/**/Photoglide-*.exe
